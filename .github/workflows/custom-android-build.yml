name: custom-android-build

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Android ABI to build"
        type: choice
        default: arm64
        options:
          - arm64
          - arm
          - amd64
          - all
      env:
        description: "FlClash app env"
        type: choice
        default: pre
        options:
          - pre
          - stable

jobs:
  android:
    name: Android APK (${{ inputs.arch }})
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force HTTPS for submodules/git deps
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK/CMake
        run: |
          sdkmanager --install "ndk;28.0.13004108" "cmake;3.22.1"
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.0.13004108" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.0.13004108" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/cmake/3.22.1/bin" >> "$GITHUB_PATH"

      - name: Validate ZiVPN native sources
        shell: bash
        run: |
          set -euo pipefail
          test -f android/service/src/main/cpp/zivpn-native/CMakeLists.txt
          test -f android/service/src/main/cpp/zivpn-native/system/system.cpp
          test -f android/service/src/main/cpp/zivpn-native/badvpn/tun2socks/tun2socks.c
          test -s android/service/src/main/jniLibs/arm64-v8a/libuz.so
          test -s android/service/src/main/jniLibs/arm64-v8a/libload.so
          test -s android/service/src/main/jniLibs/armeabi-v7a/libuz.so
          test -s android/service/src/main/jniLibs/armeabi-v7a/libload.so
          if grep -R "com.minizivpn.app/sock_path" android/service/src/main/cpp/zivpn-native android/service/src/main/java/com/follow/clash/service/zivpn; then
            echo "ERROR: ZiVPN native socket path still points to MiniZiVPN package."
            exit 1
          fi
          grep -R "com.follow.clash/sock_path" android/service/src/main/cpp/zivpn-native/system/system.cpp android/service/src/main/cpp/zivpn-native/badvpn/tun2socks/tun2socks.c

      - name: Setup Android release signing
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          test -s android/app/keystore.jks
          keytool -list \
            -keystore android/app/keystore.jks \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -noprompt >/dev/null || {
              echo "ERROR: Failed to read keystore. Check KEYSTORE base64 encoding, KEY_ALIAS, STORE_PASSWORD, and KEY_PASSWORD secrets."
              exit 1
            }
          {
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storePassword=${{ secrets.STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Prepare Flutter dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Build Android APK
        shell: bash
        run: |
          set -euo pipefail
          ARCH="${{ inputs.arch }}"
          EXTRA=""
          if [ "$ARCH" != "all" ]; then
            EXTRA="--arch $ARCH"
          fi
          dart setup.dart android $EXTRA --env "${{ inputs.env }}"

      - name: List dist
        if: always()
        run: |
          find dist -maxdepth 3 -type f -printf "%s %p\n" | sort -nr || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flclash-custom-android-${{ inputs.arch }}-${{ github.run_number }}
          path: dist/**/*
          if-no-files-found: error
